<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 34 40" fill="none">
  <!-- Outer helix: bars tracing the C-curve from lobe, up, over, and back -->
  <rect x="8"  y="33" width="3" height="5"  rx="1.5" fill="currentColor"/>
  <rect x="5"  y="26" width="3" height="8"  rx="1.5" fill="currentColor"/>
  <rect x="3"  y="18" width="3" height="12" rx="1.5" fill="currentColor"/>
  <rect x="2"  y="12" width="3" height="7"  rx="1.5" fill="currentColor"/>
  <rect x="4"  y="6"  width="3" height="5"  rx="1.5" fill="currentColor"/>
  <rect x="9"  y="2"  width="3" height="10" rx="1.5" fill="currentColor"/>
  <rect x="15" y="1"  width="3" height="6"  rx="1.5" fill="currentColor"/>
  <rect x="21" y="2"  width="3" height="9"  rx="1.5" fill="currentColor"/>
  <rect x="26" y="5"  width="3" height="12" rx="1.5" fill="currentColor"/>
  <rect x="29" y="13" width="3" height="7"  rx="1.5" fill="currentColor"/>
  <rect x="30" y="20" width="3" height="5"  rx="1.5" fill="currentColor"/>
  <rect x="28" y="26" width="3" height="8"  rx="1.5" fill="currentColor"/>
  <!-- Inner ear: antihelix fold -->
  <rect x="12" y="13" width="3" height="5"  rx="1.5" fill="currentColor"/>
  <rect x="16" y="11" width="3" height="7"  rx="1.5" fill="currentColor"/>
  <rect x="20" y="13" width="3" height="5"  rx="1.5" fill="currentColor"/>
