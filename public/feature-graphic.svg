<svg width="1024" height="500" viewBox="0 0 1024 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Subtle radial glow on left to lift content -->
    <radialGradient id="bgGlow" cx="28%" cy="48%" r="55%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#141c28" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0f1115" stop-opacity="1"/>
    </radialGradient>

    <!-- Glow filter for waveform bars -->
    <filter id="waveGlow" x="-40%" y="-15%" width="180%" height="130%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Right-edge fade mask so waveform bleeds off cleanly -->
    <linearGradient id="rightFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="white" stop-opacity="1"/>
      <stop offset="75%"  stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <mask id="waveMask">
      <rect x="470" y="0" width="554" height="500" fill="url(#rightFade)"/>
    </mask>

    <!-- Left-edge fade mask so waveform doesn't stomp on text -->
    <linearGradient id="leftFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="white" stop-opacity="0"/>
      <stop offset="25%" stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="white" stop-opacity="1"/>
    </linearGradient>
    <mask id="waveLeftMask">
      <rect x="470" y="0" width="554" height="500" fill="url(#leftFade)"/>
    </mask>
  </defs>

  <!-- ── BACKGROUND ─────────────────────────────────────────── -->
  <rect width="1024" height="500" fill="#0f1115"/>
  <rect width="1024" height="500" fill="url(#bgGlow)"/>

  <!-- Top accent stripe -->
  <rect x="0" y="0" width="1024" height="1.5" rx="0" fill="#38d9d9" opacity="0.45"/>

  <!-- ── LARGE WAVEFORM (right zone, decorative) ────────────── -->
  <!--
    9 bars scaled 14× from the logomark source:
      orig: bar-width=3px, stride=4px → scaled: 42px wide, 56px stride
      Total width: 8×56 + 42 = 490px
      Bars start at x=504, end at x=994
      All bars centered at y=256
  -->
  <g filter="url(#waveGlow)" mask="url(#waveMask)">
    <!-- Bar 1  orig h=8  → 112px   centered y=256 → y=200 -->
    <rect x="504" y="200" width="42" height="112" rx="21" fill="#38d9d9" opacity="0.12"/>
    <!-- Bar 2  orig h=18 → 252px   y=130 -->
    <rect x="560" y="130" width="42" height="252" rx="21" fill="#38d9d9" opacity="0.19"/>
    <!-- Bar 3  orig h=24 → 336px   y=88  -->
    <rect x="616" y="88"  width="42" height="336" rx="21" fill="#38d9d9" opacity="0.25"/>
    <!-- Bar 4  orig h=10 → 140px   y=186 -->
    <rect x="672" y="186" width="42" height="140" rx="21" fill="#38d9d9" opacity="0.14"/>
    <!-- Bar 5  orig h=28 → 392px   y=60  (tallest) -->
    <rect x="728" y="60"  width="42" height="392" rx="21" fill="#38d9d9" opacity="0.30"/>
    <!-- Bar 6  orig h=16 → 224px   y=144 -->
    <rect x="784" y="144" width="42" height="224" rx="21" fill="#38d9d9" opacity="0.21"/>
    <!-- Bar 7  orig h=6  → 84px    y=214 (shortest) -->
    <rect x="840" y="214" width="42" height="84"  rx="21" fill="#38d9d9" opacity="0.10"/>
    <!-- Bar 8  orig h=22 → 308px   y=102 -->
    <rect x="896" y="102" width="42" height="308" rx="21" fill="#38d9d9" opacity="0.23"/>
    <!-- Bar 9  orig h=12 → 168px   y=172 -->
    <rect x="952" y="172" width="42" height="168" rx="21" fill="#38d9d9" opacity="0.14"/>
  </g>

  <!-- Floating note labels scattered near waveform (atmospheric) -->
  <!-- "E" near bar 2 top -->
  <g transform="translate(548, 108)" opacity="0.45">
    <rect width="28" height="20" rx="4" fill="none" stroke="#38d9d9" stroke-width="1"/>
    <text x="14" y="14" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" font-weight="600" fill="#38d9d9">E</text>
  </g>
  <!-- "G" near bar 3 -->
  <g transform="translate(604, 58)" opacity="0.35">
    <rect width="28" height="20" rx="4" fill="none" stroke="#38d9d9" stroke-width="1"/>
    <text x="14" y="14" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" font-weight="600" fill="#38d9d9">G</text>
  </g>
  <!-- "F#" near bar 5 bottom -->
  <g transform="translate(716, 426)" opacity="0.22">
    <rect width="32" height="20" rx="4" fill="none" stroke="#2f3541" stroke-width="1"/>
    <text x="16" y="14" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="8" font-weight="500" fill="#8d96a5">F#</text>
  </g>
  <!-- "A" near bar 6 -->
  <g transform="translate(776, 126)" opacity="0.30">
    <rect width="28" height="20" rx="4" fill="rgba(56,217,217,0.08)" stroke="#38d9d9" stroke-width="1"/>
    <text x="14" y="14" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" font-weight="600" fill="#38d9d9">A</text>
  </g>
  <!-- "D#" near bar 8 top -->
  <g transform="translate(884, 82)" opacity="0.20">
    <rect width="32" height="20" rx="4" fill="none" stroke="#2f3541" stroke-width="1"/>
    <text x="16" y="14" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="8" font-weight="500" fill="#4b5a6b">D#</text>
  </g>

  <!-- ── CONTENT (left zone) ────────────────────────────────── -->

  <!-- EAR TRAINING label row -->
  <rect x="72" y="113" width="24" height="1.5" rx="0.75" fill="#38d9d9"/>
  <text
    x="102" y="120"
    font-family="ui-monospace, 'JetBrains Mono', monospace"
    font-size="9.5"
    font-weight="600"
    fill="#38d9d9"
    letter-spacing="2.5"
  >EAR TRAINING</text>

  <!-- Logomark (2.5× scale of original SVG bars) -->
  <!-- Original viewBox 0 0 35 32; bars centered at y=16 → at 2.5× centered at y=40 -->
  <!-- Bounding box: w=87.5, h=75 (y from 5→75) -->
  <g transform="translate(72, 136)" fill="#38d9d9">
    <rect x="0"  y="30"   width="7.5" height="20"  rx="3.75"/>
    <rect x="10" y="17.5" width="7.5" height="45"  rx="3.75"/>
    <rect x="20" y="10"   width="7.5" height="60"  rx="3.75"/>
    <rect x="30" y="27.5" width="7.5" height="25"  rx="3.75"/>
    <rect x="40" y="5"    width="7.5" height="70"  rx="3.75"/>
    <rect x="50" y="20"   width="7.5" height="40"  rx="3.75"/>
    <rect x="60" y="32.5" width="7.5" height="15"  rx="3.75"/>
    <rect x="70" y="12.5" width="7.5" height="55"  rx="3.75"/>
    <rect x="80" y="25"   width="7.5" height="30"  rx="3.75"/>
  </g>
  <!-- Logo occupies y=141(top) → y=211(bottom) -->

  <!-- App name: "Absolute" -->
  <text
    x="72" y="282"
    font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="60"
    font-weight="700"
    fill="#f8fafc"
    letter-spacing="-2"
  >Absolute</text>

  <!-- App name: "Ear." in accent teal -->
  <text
    x="72" y="350"
    font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="60"
    font-weight="700"
    fill="#38d9d9"
    letter-spacing="-2"
  >Ear.</text>

  <!-- Tagline -->
  <text
    x="72" y="385"
    font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="17"
    font-weight="400"
    fill="#8d96a5"
    letter-spacing="-0.2"
  >Train your ears to hear every note.</text>

  <!-- Thin separator -->
  <rect x="72" y="403" width="340" height="1" fill="#2f3541"/>

  <!-- ── NOTE STRIP (chromatic scale progression) ────────────── -->
  <!--
    12 notes: natural=28px wide, sharp=34px wide, gap=4px
    Sequence: C C# D D# E F F# G G# A A# B
    Styles:
      MASTERED (C, E, G) → teal fill + border
      MEDIUM   (D, F, A, B) → teal outline, dim
      LOCKED   (C#, D#, F#, G#, A#) → dark outline, dim gray
  -->

  <!-- C — MASTERED -->
  <rect x="72"  y="413" width="28" height="22" rx="4" fill="rgba(56,217,217,0.14)" stroke="#38d9d9" stroke-width="1.25"/>
  <text x="86"  y="428" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9.5" font-weight="700" fill="#38d9d9">C</text>

  <!-- C# — LOCKED -->
  <rect x="104" y="413" width="34" height="22" rx="4" fill="none" stroke="#2f3541" stroke-width="1"/>
  <text x="121" y="428" text-anchor="middle" font-family="ui-monospace,monospace" font-size="8.5" font-weight="500" fill="#4b5a6b">C#</text>

  <!-- D — MEDIUM -->
  <rect x="142" y="413" width="28" height="22" rx="4" fill="none" stroke="rgba(56,217,217,0.3)" stroke-width="1"/>
  <text x="156" y="428" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9.5" font-weight="600" fill="rgba(56,217,217,0.45)">D</text>

  <!-- D# — LOCKED -->
  <rect x="174" y="413" width="34" height="22" rx="4" fill="none" stroke="#2f3541" stroke-width="1"/>
  <text x="191" y="428" text-anchor="middle" font-family="ui-monospace,monospace" font-size="8.5" font-weight="500" fill="#4b5a6b">D#</text>

  <!-- E — MASTERED -->
  <rect x="212" y="413" width="28" height="22" rx="4" fill="rgba(56,217,217,0.14)" stroke="#38d9d9" stroke-width="1.25"/>
  <text x="226" y="428" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9.5" font-weight="700" fill="#38d9d9">E</text>

  <!-- F — MEDIUM -->
  <rect x="244" y="413" width="28" height="22" rx="4" fill="none" stroke="rgba(56,217,217,0.3)" stroke-width="1"/>
  <text x="258" y="428" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9.5" font-weight="600" fill="rgba(56,217,217,0.45)">F</text>

  <!-- F# — LOCKED -->
  <rect x="276" y="413" width="34" height="22" rx="4" fill="none" stroke="#2f3541" stroke-width="1"/>
  <text x="293" y="428" text-anchor="middle" font-family="ui-monospace,monospace" font-size="8.5" font-weight="500" fill="#4b5a6b">F#</text>

  <!-- G — MASTERED -->
  <rect x="314" y="413" width="28" height="22" rx="4" fill="rgba(56,217,217,0.14)" stroke="#38d9d9" stroke-width="1.25"/>
  <text x="328" y="428" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9.5" font-weight="700" fill="#38d9d9">G</text>

  <!-- G# — LOCKED -->
  <rect x="346" y="413" width="34" height="22" rx="4" fill="none" stroke="#2f3541" stroke-width="1"/>
  <text x="363" y="428" text-anchor="middle" font-family="ui-monospace,monospace" font-size="8.5" font-weight="500" fill="#4b5a6b">G#</text>

  <!-- A — MEDIUM -->
  <rect x="384" y="413" width="28" height="22" rx="4" fill="none" stroke="rgba(56,217,217,0.3)" stroke-width="1"/>
  <text x="398" y="428" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9.5" font-weight="600" fill="rgba(56,217,217,0.45)">A</text>

  <!-- A# — LOCKED -->
  <rect x="416" y="413" width="34" height="22" rx="4" fill="none" stroke="#2f3541" stroke-width="1"/>
  <text x="433" y="428" text-anchor="middle" font-family="ui-monospace,monospace" font-size="8.5" font-weight="500" fill="#4b5a6b">A#</text>

  <!-- B — MEDIUM -->
  <rect x="454" y="413" width="28" height="22" rx="4" fill="none" stroke="rgba(56,217,217,0.3)" stroke-width="1"/>
  <text x="468" y="428" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9.5" font-weight="600" fill="rgba(56,217,217,0.45)">B</text>

  <!-- Bottom label: platform availability -->
  <text
    x="72" y="474"
    font-family="ui-monospace, 'JetBrains Mono', monospace"
    font-size="9.5"
    font-weight="500"
    fill="#38d9d9"
    opacity="0.5"
    letter-spacing="1.8"
  >iOS  ·  ANDROID</text>

</svg>
